monitor=eDP-1,preferred,0x0,1 # Internal


# Dual monitor setup
monitor=DP-2,preferred,0x-1080,1
monitor=DP-4,preferred,-1080x0,1,transform,1

# 1440p setup
# External, assuming it is 1440p, vertical
#monitor=DP-1,preferred,-1440x-1440,1,transform,1
# External, not vertical
# monitor=DP-1,preferred,0x-1440,1

# External, cabin, vertical
monitor=HDMI-A-1,preferred,1920x-1080,1,transform,1
# Waybar
exec-once = waybar
exec-once = swaybg -i /usr/share/wallpapers/minimalist.png -m fill
exec-once = /home/vs/.config/hypr/battery_monitor.sh

exec-once = sh /home/vs/.config/hypr/autostart.sh

# blurls = waybar

# swaybg

# SwayNotificationCenter
exec-once = swaync
bind = SUPERSHIFT , n , exec , swaync-client -t -sw

# Network Manager
exec-once = nm-applet --indicator

general {



    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
    border_size                    = 2
    no_border_on_floating          = false
    gaps_in                        = 4
    gaps_out                       = 8

    col.inactive_border            = rgba(595959aa)
    col.active_border              = rgba(51afefee) rgba(00ff99ee) 45deg
    cursor_inactive_timeout        = 10
    layout                         = dwindle
    resize_on_border               = true
    extend_border_grab_area        = 15
    hover_icon_on_border           = true
}

group {
    col.border_active          = 0x66ffff00
    col.border_inactive        = 0x66777700
    col.border_locked_inactive = 0x66775500
    col.border_locked_active   = 0x66ff5500
}

decoration {

    rounding = 5

    blur {
        enabled = true
        size = 3
        passes = 1
    }

    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled   = true
    animation = windows           , 1 , 6 , default , slide
    animation = windowsIn         , 1 , 6 , default , slide
    animation = windowsOut        , 1 , 6 , default , slide
    animation = windowsMove       , 1 , 6 , default , slide
    animation = fadeIn            , 1 , 1 , default
    animation = fadeOut           , 1 , 6 , default
    animation = fadeSwitch        , 1 , 1 , default
    animation = fadeDim           , 1 , 1 , default
    animation = border            , 1 , 6 , default
    animation = borderangle       , 1 , 6 , default
    animation = workspaces        , 1 , 5 , default , slide
    animation = specialWorkspace  , 1 , 5 , default , slide
}

input {
    kb_layout    = no
    kb_options   = caps:swapescape
    repeat_rate  = 32
    repeat_delay = 200
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        scroll_factor = 0.2
    }
}

gestures {
    workspace_swipe = true
}

binds {
}

dwindle {
    force_split       = 2
    preserve_split    = true
    no_gaps_when_only = false
}

master {
}

misc {
    force_default_wallpaper = 0
}

# -----------------------------------------------------------------------------

$mainMod = SUPER

bind = $mainMod , F, fullscreen, 0
bind = $mainMod , M, fullscreen, 1
bind = $mainMod , Q , killactive     ,
bind = $mainMod , V , togglefloating ,
bind = $mainMod , T , exec, /home/vs/.config/hypr/toggle_waybar.sh
bind = $mainMod, D, exec, wofi --show drun

# Rofi
bind = $mainMod , P     , exec , ~/.config/rofi/powermenu/type-1/powermenu.sh
bind = $mainMod , RETURN     , exec , kitty

# Move focus with mainMod + arrow keys
bind = $mainMod , left  , movefocus, l
bind = $mainMod , h     , movefocus, l

bind = $mainMod , right , movefocus, r
bind = $mainMod , l     , movefocus, r

bind = $mainMod , up    , movefocus, u
bind = $mainMod , k     , movefocus, u

bind = $mainMod , down  , movefocus, d
bind = $mainMod , j     , movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod , 1 , workspace , 1
bind = $mainMod , 2 , workspace , 2
bind = $mainMod , 3 , workspace , 3
bind = $mainMod , 4 , workspace , 4
bind = $mainMod , 5 , workspace , 5
bind = $mainMod , 6 , workspace , 6
bind = $mainMod , 7 , workspace , 7
bind = $mainMod , 8 , workspace , 8
bind = $mainMod , 9 , workspace , 9
bind = $mainMod , 0 , workspace , 1

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT , 1 , movetoworkspace , 1
bind = $mainMod SHIFT , 2 , movetoworkspace , 2
bind = $mainMod SHIFT , 3 , movetoworkspace , 3
bind = $mainMod SHIFT , 4 , movetoworkspace , 4
bind = $mainMod SHIFT , 5 , movetoworkspace , 5
bind = $mainMod SHIFT , 6 , movetoworkspace , 6
bind = $mainMod SHIFT , 7 , movetoworkspace , 7
bind = $mainMod SHIFT , 8 , movetoworkspace , 8
bind = $mainMod SHIFT , 9 , movetoworkspace , 9

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod , mouse_down , workspace, e+1
bind = $mainMod , mouse_up   , workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod , mouse:272 , movewindow
bindm = $mainMod , mouse:273 , resizewindow

# Toggle split
bind = SUPERSHIFT , space , togglesplit

# Swap window
bind = SUPERSHIFT , l , swapwindow , r
bind = SUPERSHIFT , h , swapwindow , l
bind = SUPERSHIFT , k , swapwindow , u
bind = SUPERSHIFT , j , swapwindow , d

windowrule = workspace 1,^(firefox)$
windowrule = workspace 2,^(kitty)$
windowrule = workspace 3,^(neovide)$
windowrule = workspace 4,^(Morgen)$

# will switch to a submap called resize
bind = $mainMod , R , submap , resize
bind = $mainMod, E , exec, sudo shutdown now -E

# will start a submap called "resize"
submap = resize

# sets repeatable binds for resizing the active window
bind = , right , resizeactive , 10 0
bind = , left  , resizeactive , -10 0
bind = , up    , resizeactive , 0 -10
bind = , down  , resizeactive , 0 10

# use reset to go back to the global submap
bind = , escape , submap , reset

# will reset the submap, meaning end the current one and return to the global one
submap = reset

# Brightness
bind = , XF86MonBrightnessUp   , exec , brightnessctl set +5%
bind = , XF86MonBrightnessDown , exec , brightnessctl set 5%-

# Media player controls
bind = , XF86AudioPlay  , exec , playerctl play-pause
bind = , XF86AudioPause , exec , playerctl play-pause
bind = , XF86AudioNext  , exec , playerctl next
bind = , XF86AudioPrev  , exec , playerctl previous

# Volume
bind = , XF86AudioRaiseVolume , exec , pactl set-sink-volume @DEFAULT_SINK@   +5%
bind = , XF86AudioLowerVolume , exec , pactl set-sink-volume @DEFAULT_SINK@   -5%
bind = , XF86AudioMute        , exec , pactl set-sink-mute   @DEFAULT_SINK@   toggle && ~/.config/dunst/scripts/show_mute.sh
bind = , XF86AudioMicMute     , exec , pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Screenshots
bind = $shiftMod, PRINT, exec, hyprshot -m region
bind = SHIFT , Print , exec , mkdir -p ~/Pictures/Screenshots/ && hyprshot -m region

# trigger when the switch is turning off
bindl = , switch:off:Lid Switch,exec,hyprctl keyword monitor "eDP-1, 1920x1080, 0x0, 1"
# trigger when the switch is turning on
bindl = , switch:on:Lid Switch,exec,hyprctl keyword monitor "eDP-1, disable"
